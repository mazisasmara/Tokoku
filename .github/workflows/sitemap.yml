name: Generate Sitemap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Sitemap Package
      run: npm install -g sitemap-generator-cli

    - name: Generate Sitemap
      run: |
        npx sitemap-generator-cli https://shop.azisasmara.my.id --filepath ./sitemap.xml

    - name: Commit Sitemap
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ./sitemap.xml
        git commit -m "Generate sitemap via GitHub Actions" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}