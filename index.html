<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        /* Hero Section */
        .hero { 
            background-color: #6a1b9a; /* Purple Theme */
            color: white; 
            text-align: center; 
            padding: 100px 20px; 
            animation: fadeIn 2s;
        }
        /* Pricing Section */
        .pricing { 
            display: flex; 
            justify-content: space-around; 
            padding: 50px 20px; 
        }
        .package { 
            border: 2px solid #6a1b9a; 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            width: 200px; 
            animation: typing 1.5s forwards;
        }
        /* Features Section */
        .features { 
            background-color: #f3e5f5; 
            padding: 50px 20px; 
        }
        /* Contact Section */
        .contact { 
            background-color: #6a1b9a; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes typing {
            0% { opacity: 0; transform: translateY(20px); }  
            100% { opacity: 1; transform: translateY(0); }  
        }
        @media (max-width: 600px) {
            .pricing { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Our Website</h1>
        <p>Your journey to excellence starts here.</p>
        <button style="background-color: white; color: #6a1b9a; padding: 10px 20px; border: none; border-radius: 5px;">Get Started</button>
    </div>
    <div class="pricing">
        <div class="package">
            <h2>Basic Package</h2>
            <p>$99/month</p>
            <button>Choose Plan</button>
        </div>
        <div class="package">
            <h2>Premium Package</h2>
            <p>$199/month</p>
            <button>Choose Plan</button>
        </div>
    </div>
    <div class="features">
        <h2>Our Features</h2>
        <ul>
            <li>Feature 1</li>
            <li>Feature 2</li>
            <li>Feature 3</li>
        </ul>
    </div>
    <div class="contact">
        <h2>Contact Us</h2>
        <p>Email: contact@example.com</p>
    </div>
</body>
</html>
